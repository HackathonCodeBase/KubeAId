<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0d0d0d" stroke="#CC0000" stroke-width="2" opacity="0.1"/>
  
  <!-- Main K shape with gradient -->
  <defs>
    <linearGradient id="kGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CC0000;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#990000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- K letterform -->
  <g>
    <!-- Vertical stroke of K -->
    <rect x="50" y="40" width="18" height="120" fill="url(#kGradient)" rx="3"/>
    
    <!-- Top diagonal of K -->
    <polygon points="68,40 130,85 72,85" fill="url(#kGradient)"/>
    
    <!-- Bottom diagonal of K -->
    <polygon points="68,120 130,160 72,115" fill="url(#kGradient)"/>
  </g>
  
  <!-- AI circuit nodes (intelligent dots) -->
  <g opacity="0.9">
    <!-- Node 1 - top right -->
    <circle cx="145" cy="55" r="5" fill="#CC0000"/>
    <line x1="125" y1="70" x2="145" y2="55" stroke="#CC0000" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Node 2 - middle right -->
    <circle cx="150" cy="100" r="5" fill="#CC0000"/>
    <line x1="130" y1="95" x2="150" y2="100" stroke="#CC0000" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Node 3 - bottom right -->
    <circle cx="145" cy="145" r="5" fill="#CC0000"/>
    <line x1="125" y1="130" x2="145" y2="145" stroke="#CC0000" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Subtle pulse ring (animation-ready) -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#CC0000" stroke-width="1.5" opacity="0.2" stroke-dasharray="5,5"/>
</svg>