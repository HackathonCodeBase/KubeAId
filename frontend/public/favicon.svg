<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="200" height="200" fill="#0d0d0d"/>
  
  <!-- Border circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#CC0000" stroke-width="2"/>
  
  <defs>
    <linearGradient id="favGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main K shape -->
  <g>
    <rect x="50" y="40" width="18" height="120" fill="url(#favGradient)" rx="2"/>
    <polygon points="68,40 130,85 72,85" fill="url(#favGradient)"/>
    <polygon points="68,120 130,160 72,115" fill="url(#favGradient)"/>
  </g>
  
  <!-- AI nodes -->
  <circle cx="145" cy="60" r="4" fill="#CC0000" opacity="0.9"/>
  <circle cx="150" cy="100" r="4" fill="#CC0000" opacity="0.9"/>
  <circle cx="145" cy="140" r="4" fill="#CC0000" opacity="0.9"/>
</svg>